<mat-drawer-container>
  <mat-drawer #drawer [mode]="isMobile ? 'over' : 'side'" [opened]="!isMobile" (openedChange)="onDrawerChange($event)">
    <app-layout-side></app-layout-side>
  </mat-drawer>
  <mat-drawer-content>
    <app-layout-header (toggleDrawer)="toggleDrawer()"></app-layout-header>
    <br>
    <router-outlet></router-outlet>
    <br>
    <app-layout-footer></app-layout-footer>
  </mat-drawer-content>
</mat-drawer-container>
