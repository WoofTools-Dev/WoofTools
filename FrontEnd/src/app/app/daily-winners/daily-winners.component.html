<body>
  <div class="row mx-2">
    <div class="col-12">
      <h1 class="heading-primary">Daily Winners</h1>
      <div class="mt-5">
        <table mat-table [dataSource]="dataSource" class="mat-elevation-z8">
          <ng-container matColumnDef="position">
            <th mat-header-cell *matHeaderCellDef> # </th>
            <td mat-cell *matCellDef="let i = index"> {{ i + 1 }} </td>
          </ng-container>
          <ng-container matColumnDef="username">
            <th mat-header-cell *matHeaderCellDef> Username </th>
            <td mat-cell *matCellDef="let element"> {{ element.username }} </td>
          </ng-container>
          <ng-container matColumnDef="price">
            <th mat-header-cell *matHeaderCellDef> Price </th>
            <td mat-cell *matCellDef="let element"> ${{ element.price }} </td>
          </ng-container>
          <ng-container matColumnDef="growthPercentage">
            <th mat-header-cell *matHeaderCellDef> Growth </th>
            <td mat-cell *matCellDef="let element">
              <div [ngClass]="{ 'text-danger': element.growthPercentage < 0, 'text-success': element.growthPercentage >= 0 }">
                {{ element.growthPercentage }}%
              </div>
            </td>
          </ng-container>
          <ng-container matColumnDef="date">
            <th mat-header-cell *matHeaderCellDef> Date </th>
            <td mat-cell *matCellDef="let element"> {{ element.date | date }} </td>
          </ng-container>
          <tr mat-header-row *matHeaderRowDef="displayedColumns"></tr>
          <tr mat-row *matRowDef="let row; columns: displayedColumns;"></tr>
        </table>
        <mat-paginator [pageSizeOptions]="[5, 10, 25, 100]" showFirstLastButtons></mat-paginator>
      </div>
    </div>
  </div>
</body>
